 {num:34, text:"En 40-årig man söker efter att ha blivit skuren med ett vasst föremål. Han har flera djupa sår i ansiktet, varav ett som går tvärs över kinden. Vilken är den mest kritiska initiala åtgärden?", options:["Noggrann rengöring och bedömning av nervskador","Noggrann rengöring och steristrips för att undvika att suturer ger fula ärr","Snarast möjlig suturering för att undvika keloid","Akut remiss till neurofysiologen för neurografi","CT av ansiktet för bedömning av djupare skador"], correct:1},
 {num:35, text:"En 17-årig flicka söker vård då hon haft återkommande halsinfektioner under de senaste två åren. Hon berättar att hon har haft ont i halsen minst fem gånger per år och nästan varje gång har hon behövt antibiotikabehandling. Vid undersökning är hennes tonsiller förstorade och lite gropiga, även om hon för tillfället inte har en akut infektion. Kronisk tonsillit är ett vanligt problem hos ungdomar och yngre vuxna och kan föranleda tonsillektomi för att förbättra livskvaliteten. Hon undrar hur det kommer att kännas i halsen efter operationen och vilka risker det finns med operationen. Vad svarar du? Välj det lämpligaste alternativet.", options:["Det kommer att göra ont i 10-14 dagar och förutom en viss blödningsrisk så ökar risken för pneumonier när tonsillerna är borta.","Det kommer att göra ont i 10-14 dagar trots smärtstillande och du kommer inte kunna gå tillbaka till skolan på 4 veckor.","Med moderna smärtstillande mediciner kommer det i princip inte göra ont alls och med modern kirurgisk teknik är blödningsrisken i princip obefintlig.","Med moderna smärtstillande mediciner kommer det i princip inte göra ont alls. Den största risken är blödning som kan föranleda både sjukhusvård och reoperation.","Räkna med att det gör ont i 10-14 dagar även om du tar smärtstillande. Den största risken är blödning som kan föranleda både sjukhusvård och reoperation."], correct:5},
 {num:36, text:"En 35-årig man söker vård på grund av ökande svårigheter att svälja fast föda. Han beskriver ingen smärta men upplever att maten fastnar i bröstet. Han går varje år på julbord med sina arbetskamrater och vid de två senaste tillfällena har han behövt söka akut på grund av främmande kropp i esofagus. Du beställer nu en endoskopi som visar så kallad trakealisering och biopsier verifierar diagnosen eosinofil esofagit. Vilken initial behandling är mest lämplig för detta tillstånd?", options:["Ballongdilatation av de trånga partierna","Dietrestriktioner","Protonpumpshämmare","Lokal kortikosteroid"], correct:4},
 {num:37, text:"En 64-årig kvinna söker på vårdcentralen för gradvis ökande svårigheter att svälja. Hon beskriver också ofrivillig viktnedgång och trötthet. Blodprover visar att hon har anemi. Hon är tidigare storrökare och möjligen har det missbrukats alkohol. Du misstänker esofaguscancer. Vilken åtgärd är mest lämplig?", options:["SVF-remiss för gastroskopi och MR","SVF-remiss för gastroskopi","SVF-remiss för laryngoskopi","SVF-remiss för CT hals-thorax med kontrast","SVF-remiss för röntgenundersökning av esofagus med vattenlöslig kontrast"], correct:2},
 {num:38, text:"En 4-årig pojke förs akut till sjukhuset med hög feber, svår halssmärta och svårt att andas. Han sitter framåtlutad, dreglar och vägrar ligga ner. Du lyckas genomföra endoskopi och ser en röd och mycket svullen epiglottis. Du konstaterar att detta är det första fallet av epiglottit du sett. Vilket vaccin har gjort att barnepiglottit numera är mycket ovanligt i Sverige?", options:["Difterivaccin","Pneumokockvaccin","Covid-19 vaccin","Influenzaevaccin","Haemophilus influenzae typ B vaccin"], correct:5},
 {num:39, text:"En 35-årig kvinna söker på grund av heshet och andningsbesvär vid ansträngning efter att ha genomgått en sköldkörteloperation. Vid endoskopi av larynx ses en ensidig stämbandspares. Vilken nerv har troligen skadats vid operationen?", options:["n. accessorius","n. glossopharyngeus","n. hypoglossus","n. obturatorius","n. recurrens"], correct:5},
 {num:40, text:"En 68-årig man med långvarig heshet diagnostiseras med en stor malign tumör i larynx. Han har inga tecken på regionala metastaser. Det finns många olika behandlingsformer för cancer. Vilka två behandlingsformer är de vanligaste vid just ÖNH-cancer?", options:["Kirurgi och strålbehandling","Cytostatika och kirurgi","Cytostatika och strålning","Strålning och antikroppsbehandling/biologiska läkemedel","Kirurgi och antikroppsbehandling/biologiska läkemedel"], correct:1},
 {num:41, text:"Vilka av följande symtom ses vid ryggmärgsskada och neurogen chock?", options:["Lågt blodtryck, hög puls, hyperreflexi.","Lågt blodtryck, låg puls, mios.","Högt blodtryck, hög puls, nedsatt pupillreflex.","Lågt blodtryck, låg puls, torr och varm hud.","Lågt blodtryck, hög puls, blek och kallsvettig."], correct:4},
 {num:42, text:"Vad är det viktigaste skälet till att undvika lumbalpunktion vid misstänkt hjärnabscess med stor masseffekt?", options:["Risk för herniering","Ökar risken för meningit","Ger falskt negativa odlingssvar","Kan utlösa status epilepticus","Svårt att bedöma proteinkvot"], correct:1},
 {num:43, text:"Vad är inte sant gällande CPP och ICP vid trauma med intrakraniell blödning (och störd autoregulation)? (CPP = cerebral perfusion pressure. ICP = intra cranial pressure)", options:["En stor sänkning i MAP sänker CPP","Hyperventilering sänker CPP","Mannitol ger sänkt ICP","Ett högt ICP, vid tex trauma, sänker CPP","Hypokapni ger sänkt ICP"], correct:2},

 {num:45, text:"Gliom och glioblastom är samlingsnamn för hjärntumörer som kan ha ursprung från flera celltyper. Vilken av följande celltyper ger inte Gliom?", options:["Oligodendrocyter","Arachnoidala celler","Astrocyter","Ependymceller"], correct:2},
 {num:46, text:"Vilket av följande påståenden är falskt gällande migränbehandling?", options:["Naproxen har profylaktisk effekt vid menstruationsbunden migrän.","Kandesartan 16mg är ett förstahandsval som förebyggande migränbehandling.","Vid fler än 3 migränanfall per månad bör man överväga farmakologisk profylax.","Triptaner ger en selektiv kärldilatation intrakraniellt.","Man ska inte ta triptaner under pågående aura."], correct:4},

 {num:48, text:"Vilken gliacell myeliniserar axoner i centrala nervsystemet?", options:["Astrocyter","Ependymceller","Mikroglia","Oligodendrocyter","Schwannska celler"], correct:4},

 {num:50, text:"Vilket laboratoriefynd är oftast förekommande vid Myastenia gravis?", options:["ANA-positivitet","Anti-MuSK-antikroppar","Anti-Hu antikroppar","Anti-AChR antikroppar","Förhöjt CK"], correct:4},
 {num:51, text:"Vilken hjärntumör orsakar mest sannolikt hormonella störningar?", options:["Glioblastom","Astrocytom grad II","Hypofysadenom","Medulloblastom","Meningiom"], correct:3},
 {num:52, text:"En 40-årig kvinna med myastenia gravis har nyligen påbörjat behandling med pyridostigmin. Hon söker nu för muskelkramper och diarré. Vad är den mest sannolika orsaken?", options:["Hyperkalcemi","Infektion","Hypokalemi","Myasten kris","Kolinerg överdosering"], correct:5},
 {num:53, text:"Felicia, 15 år, besväras av trötthet. Hon sover dåligt om nätterna med mycket mardrömmar. Somnar ofta på lektionerna på dagarna fastän hon inte vill. Ibland när hon vaknar på natten kan hon inte röra sig eller prata, hon är som fastfrusen, fastän hon är vaken. Det märkligaste är att hon senaste åren börjat tappa saker ur händerna varje gång hon blir rädd, förvånad, eller skrattar mycket. Du misstänker en diagnos där man ofta finner förändrade halter av ett visst ämne i hjärnan. Vilket är ämnet och hur är det förändrat?", options:["För lite av hormonet Incretin","För mycket av hormonet Orexin","För mycket av signalsubstansen GABA","För lite av hormonet Melatonin","För lite av hormonet Orexin"], correct:5},
 {num:54, text:"Vilken behandling är förstahandsvalet vid meningiom som orsakar symtom?", options:["Kirurgisk resektion","Observation utan behandling","Kemoterapi","Strålbehandling","Immunterapi"], correct:1},
 {num:55, text:"En 48-årig man söker för tilltagande personlighetsförändring och initiativlöshet under tre månader. Hans fru beskriver honom som \"långsam och ointresserad\". Han har haft ett generaliserat tonisk-kloniskt krampanfall nyligen. DT hjärna visar en låggradig hypodens lesion frontalt höger utan ödem eller mass-effekt. Vilken typ av tumör är mest sannolik?", options:["Glioblastom","Ependymom","Oligodendrogliom","Medulloblastom","Meningiom"], correct:3},
 {num:56, text:"Du träffar Ida 22 år på akutmottagningen. Medföljande kompis berättar att de var i affären när Ida plötsligt föll ihop och blev okontaktbar. Först trodde kompisen att hon svimmat men sedan ryckte det också i armar och ben. Ida vaknade och \"kom till sig\" efter cirka 30 sekunder. Hon har nu lite huvudvärk men mår annars väl. Vilken av nedanstående resonemang är mest rätt?", options:["Det var troligtvis psykogent eftersom Ida är ung och är så opåverkad.","Det måste ha varit ett tonisk-kloniskt anfall då Ida ryckte i armar och ben.","Det kan ha varit en konvulsiv syncope.","För att fastslå vad som hände måste man göra EEG."], correct:3},
 {num:57, text:"Vilket av följande statusfynd/symtom är inte väntat vid motorneuronsjukdom?", options:["Ortostatisk hypotension","Svaghet i handens småmuskler","Dysartri med nasalering av talet","Atrofi i proximal muskulatur","Normal MR hjärna"], correct:1},
 {num:58, text:"Du går husjour på kirurgavdelningen på NÄL där 50-åriga Birgitta vårdas för ohållbar hemsituation. Hon har tablettbehandlad hypertoni och flera tidigare vårdtillfällen för pankreatit. Man ringer dig nu då hon blivit förvirrad och upplevs försämrad i balansen. I status är hon svårundersökt och har svårt att stå. Orienterad till person, men ej plats eller tid. Vid ögonföljerörelser kommer höger öga ej över medellinjen vid blick åt höger och vänster öga ej över medellinjen vid blick åt vänster. Du ser rotatorisk nystagmus i horisontalled. Babinskis tecken saknas. Vad har patienten mest troligt drabbats av?", options:["Cerebellär infarkt","Wernickes encefalopati","Hjärnstamsencefalit","Delirium tremens","Miller-Fishers syndrom"], correct:2},
 {num:59, text:"Vilken av nedanstående rörelsestörningar förekommer normalt inte vid Parkinsons sjukdom?", options:["Bradykinesi","Hyperkinesi","Ataxi","Restless legs","Tremor"], correct:3},
 {num:60, text:"Du är på motorikmottagningen och din nästa patient är Amin 68 år med Parkinsons sjukdom. Ni sågs senast för tre månader sedan då du ändrade doserna i hans parkinsonmedicinering eftersom han kände sig stelare. Nu berättar medföljande hustru att Amin har börjat spela mycket på internetkasino och hon är orolig att han ska utveckla ett spelberoende. Vilket läkemedel har störst risk för att ge upphov till denna typ av biverkan?", options:["Dopaminprekursor levodopa/carbidopa","Antidyskinesiläkemedlet amantadin","MAOB-hämmaren rasagilin","Dopaminagonisten pramipexol","COMThämmaren entakapon"], correct:4},
 {num:61, text:"Eva-Britt är 71 år och har remitterats till neurologmottagning på misstanke om parkinsonism. Hon går med rak hållning och sätter sig på stolen med en duns. Av anamnesen framkommer att hennes symtom började för ett år sedan och att hon har problem med återkommande fall och att hon har svårt att komma i gång när hon går. Maken har helt fått ta över städningen för hon verkar inte bry sig om sådant längre. Vilken är den mest troliga diagnosen baserat på denna information?", options:["PSP- Progressiv supranukleär paralys","Demens med Lewy bodies","Idiopatisk parkinsons sjukdom","Normaltryckshydrocefalus","MSA – multipel systematrofi"], correct:1},
 {num:62, text:"För diagnosen idiopatisk parkinsons sjukdom krävs att man i status finner minst 2 av 3 symtom, varav ett symtom/statusfynd är obligat för diagnos, vilket?", options:["Bradykinesi","Vilotremor","Festination vid gång","Tremor","Rigiditet"], correct:1},
 {num:63, text:"Din nästa patient på mottagningen är Anton som är inremitterad på frågeställning om Wilsons sjukdom. Vad av nedanstående är inte typiskt för Mb Wilsons?", options:["Keyser-Fleisher-ringar i ögonen","Tremor","Ataxi","Högt Hb","Lågt s-koppar"], correct:4},
 {num:64, text:"Vid Huntingtons sjukdom ses degeneration i dorsala striatum. Vilket av nedanstående är ett vanligt fynd vid Huntingtons sjukdom?", options:["Synfältsrubbningar med bortfall av delar av synfältet","Spasticitet","Svaghet och atrofier framför allt i proximal muskulatur","TCG-triplettexpansion ses vid genetisk testning","Depression och personlighetsförändring"], correct:5},
 {num:65, text:"Emma, 27 år, söker dig vid Närhälsan i Ale på grund av skakningar i händerna vilket startade i höger hand för tre-fyra år sedan. Svårigheter främst när hon ska göra något med händerna, hon ger exempel på att det är svårt att måtta upp grädde i decilitermåttet när hon ska baka. Hon har svårt att inte spilla utanför och det blir ännu värre när hon är stressad. Det är bättre efter något glas vin på fredagskvällen. Hon är i övrigt frisk. Hereditet: hennes farfar var alltid lite skakig när han åt, men ingen diagnos. Du är efter undersökning ganska säker på diagnosen och Emma vill gärna ha hjälp att lindra besvären. Vilken behandling torde vara ditt förstahandsval?", options:["Primidon, en barbituratprekursor","Propranolol, en betareceptorantagonist","Pramipexol, en dopaminreceptoragonist","Gabapentin, en alfa2delta kalciumkanalhämmare","Baklofen, en GABA-B-receptoragonist"], correct:2},
 {num:66, text:"En 33-årig tidigare frisk man inkommer till akuten efter ett första epileptiskt anfall och läggs in på avdelningen. På akuten lyckas ni bryta anfallet och patienten läggs in på avdelningen. På avdelningen sex timmar senare får han ytterligare ett likadant anfall som självterminerar. Du finner inga provocerande faktorer vid utredningen av patienten, DT är utan anmärkning och du skriver ut patienten från sjukhuset dagen efter. Vilken av nedanstående information stämmer inte för patienten?", options:["Risken för ytterligare ett anfall inom närmsta två åren är cirka 20-45 %.","Patienten har haft två oprovocerade anfall och har därmed diagnosen epilepsi och får 1 års körförbud.","Patienten får inte köra bil på 6 månader.","Om patienten är taxichaufför får han inte köra taxi på 5 år (förutsatt att han inte får fler anfall).","Patienten bör få information om att inte bada ensam eller vistas på höga höjder utan säkerhetsanordning."], correct:2},
 {num:67, text:"Vad stämmer inte in på Juvenil Myoklon Epilepsi, JME?", options:["Lamotrigin kan förvärra myoklonierna vid JME.","Det är en barnepilepsi som växer bort när patienten blir vuxen.","En förstahandsbehandling är valproat, förutom för flickor och kvinnor i fertil ålder.","Myoklonier kan finnas, särskilt de första timmarna efter uppvaknande.","Anfall provoceras hos en andel av flimmerljus och sömnbrist."], correct:2},
 {num:68, text:"Du är epilepsiläkare och tar över din pensionerade kollegas patient sedan tre år tillbaka, Sonja. Sonja har haft upprepade anfall senaste åren där hon beskrivs som frånvarande, smackar med munnen och kliar sig i huvudet upprepat under några minuter innan hon återgår till sitt vanliga jag. Sonja själv minns inte anfallen men beskriver att de föregås av en konstig känsla av att hon varit med om detta förut. Var i hjärnan startar troligen dessa fokala anfall?", options:["Hippocampus","Temporalloben","Amygdala","Pariettalloben","Frontalloben"], correct:2},
 {num:69, text:"Vid en akut exacerbation av multipel skleros, vilken av följande behandlingar är lämpligast för att minska inflammationen i närtid?", options:["Rituximab","Baclofen","Azathioprin","Methylprednisolon","Interferon beta"], correct:4},
 {num:70, text:"Vilken av dessa lokaler tillhör inte de vanligaste lokalisationerna för MS-plack?", options:["Infratentoriellt","Spinalt","Periventrikulärt","Juxtakortikalt","Nervplexus"], correct:5},
 {num:71, text:"Din nästa patient på avdelningen är en 82-årig kvinna som vårdas på grund av stroke. Du går igenom hennes MR av hjärnan och ser att hon har en infarkt som sitter occipitalt på höger sida i a.cerebri posteriors försörjningsområde. Vilket symtom är mest troligt vid denna skada?", options:["Vänstersidig hemipares","Homonym hemianopsi vänster","Hemianestesi vänster","Expressiv afasi"], correct:2},
 {num:72, text:"En stroke som ger skada i höger capsula interna kan ge:", options:["Hemisensoriskt bortfall höger","Vänstersidig hemianopsi","Vänstersidigt neglekt","Hemipares vänster","Ataxi i vänster arm och ben"], correct:4},
 {num:73, text:"Vilket av följande symtom är mest typiskt efter en stroke i höger a.cerebri anterior:", options:["Apraxi","Nedsatt uppmärksamhet, neglekt, åt vänster","Nedsatt kraft och känsel i vänster ben","Nedsatt kraft och känsel i vänster arm","Impressiv afasi"], correct:3},
 {num:74, text:"Du är primärjour och får in ett strokelarm: Arne 67 år som är högerhänt har insjuknat i plötslig högersidig svaghet. Du misstänker en M1-ocklusion vänster sida. Vilket symtom är minst troligt att finna hos Arne?", options:["Central högersidig facialispares","Högersidig homonym hemianopsi","Afasi","Apraxi","Neglekt"], correct:5},
 {num:75, text:"Du rondar på strokeavdelningen och din nästa patient är en 83-årig man som drabbats av \"Wallenbergs syndrom/Lateralt medullärt syndrom\" (ocklusion i vertebralis och/eller PICA). Du kan läsa att han har yrsel, vilket statusfynd förväntar du dig inte att se när du undersöker honom?", options:["Nedsatt sensibilitet för smärta och temperatur på ena kroppshalvan","Horners syndrom","Tal- och sväljsvårigheter","Homonym hemianopsi","Hemiataxi"], correct:4},
 {num:76, text:"En patient har fluktuerande dubbelseende, ptos och svaghet i proximala muskler som förvärras under dagen. Reflexer är normala. Vilken skadelokalisation är mest sannolik?", options:["Muskelcell","Myelin i perifera nerver","Neuromuskulär synaps","Nedre motorneuron","Övre motorneuron"], correct:3},
 {num:77, text:"Du träffar en 40-årig man på mottagningen på grund av tilltagande hälta höger sedan en vecka. I status finner du nedsatt kraft vid dorsalflexion samt vid pronation av fotleden och vid extension av tårna. Du finner även nedsatt känsel på fotryggen. I övrigt normal kraft och känsel i benet, normala reflexer. Var sitter skadan?", options:["L4-nivå","S1-nivå","L5-nivå","Nervus peroneus","Supratentoriellt vänster"], correct:4},
 {num:78, text:"Vilket påstående gällande bansystemen stämmer inte?", options:["Pyramidbanan förmedlar motorik och förlöper lateralt i ryggmärgen.","Baksträngsbanan förmedlar afferent information och korsar i medulla oblongata.","Baksträngsbanan förlöper dorsalt i ryggmärgen och förmedlar vibration och proprioception.","Tractus spinothalamicus förmedlar efferenta motoriska signaler till alfamotorneuronet som har sin cellkärna i ryggmärgens framhorn.","Tractus spinothalamicus förmedlar afferenta signaler om smärta och temperatur och korsar i medulla oblongata."], correct:5},
 {num:79, text:"I ett röntgensvar från en DT-hjärna undersökning beskrivs en primär intrakraniell homogent kontrastuppladdande tumör belägen extraaxialt. Vilken tumör passar bäst på beskrivningen?", options:["Ett meningiom.","En lungcancermetastas.","Ett astrocytom.","Ett glioblastom.","Ett oligodendrogliom."], correct:1},
 {num:80, text:"I ett röntgensvar från en DT-hjärna undersökning beskrivs en hyperattenuerande intrakraniell blödning med bikonvex form. Vilken bedömning passar bäst på den beskrivna blödningen?", options:["Det finns en kronisk intrakraniell blödning.","Det finns en akut epidural blödning.","Det finns en icke helt färsk (cirka 2 veckor gammal) subdural blödning.","Det finns en akut subarachnoidal blödning.","Det finns en akut subdural blödning."], correct:2},
 {num:81, text:"En 25-årig man söker vårdcentralen på grund av ångestbesvär. Han har inte kunnat somna förrän klockan 3-4 på morgonen senaste vecka, men behövt gå upp tidigt för sin utbildning. Han skall presentera ett större eget arbete under sin magisterutbildning i historia. Han tänker hela dagarna att han kommer göra borta sig och att andra kommer uppfatta honom som \"konstig\". Sedan längre tid har han haft svårt att vara i skolan med andra elever speciellt på lunchraster då han befarar att göra borta sig. Vilken diagnos är mest sannolik?", options:["Social ångest","Generaliserat ångestsyndrom","Autismspektrumstörning","Agorafobi"], correct:1},
 {num:82, text:"En 26-årig man söker vårdcentral då han senaste veckan haft två tillfällen av plötslig rädsla där han snabbt börjat tänka att han kommer dö i hjärtsjukdom. Han beskriver bultande hjärta, svårigheter att andas, svimningskänsla och annorlunda känsla i läppar och fingrar. Han beskriver stor oro över vad detta kan vara. Vilken diagnos är den mest korrekta?", options:["Sjukdomsångest","Akut stressreaktion","Paniksyndrom","Panikattack"], correct:4},
 {num:83, text:"En 27-årig nybliven mamma söker, på uppmaning av sin partner, vid vårdcentralen på grund av stark oro. Sedan födseln sex veckor tidigare har hon haft svårt att släppa tanken på att hon fysiskt ska skada eller smitta barnet med bakterier. Hon förnekar bestämt tankar på att vilja skada sig själv eller barnet. Vilken är den mest troliga diagnosen?", options:["Tvångssyndrom","Generaliserat ångestsyndrom","Postpartum psykos","Vanföreställningssyndrom"], correct:1},
 {num:84, text:"Vad stämmer bäst avseende PTSD?", options:["Läkemedelsbehandling direkt efter svårt trauma minskar risk för PTSD utveckling.","De flesta som utsätts för svåra trauman utvecklar inte PTSD.","Läkemedelsbehandling har liten till ingen effekt vid PTSD.","PTSD är en vanlig underliggande orsak till andra psykiatriska störningar."], correct:2},

 {num:88, text:"Du följer en 29-årig sammanboende kvinna utan barn som har bipolär sjukdom typ II. Hon har haft flera depressiva episoder de senaste åren och också hypomanier. Hon har nyligen avbrutit behandling med litium på grund av svåra gastrointestinala biverkningar som förhindrar att det återinsätts. Du önskar erbjuda henne ett alternativt stämningsstabiliserande läkemedel. Vilket är det mest lämpliga alternativet i detta fall?", options:["Valproat","Olanzapin","Fluoxetin","Lamotrigin"], correct:4},

 {num:90, text:"Ansvaret för att bereda vård åt en person som dömts till rättspsykiatrisk vård ligger på:", options:["Den region där personen är skriven","Tingsrätten för det område där brottet begåtts","Rättsmedicinalverket","Kriminalvården"], correct:1},
 {num:91, text:"Du är primärjour på psykiatriakuten och får veta att du behöver bedöma en man som polisen kom in med för en stund sedan. De träffade på honom i en park och beskrev honom som \"psykotisk\" när de lämnade av honom. Polisen har redan lämnat akutmottagningen. När du tittar i journalen ser du att det rör sig om en patient som är känd på kliniken efter flera korta vårdtillfällen med enligt LPT på grund av substansutlösta psykoser. Han har varit aggressiv tidigare och slog senast till en sjuksköterska på akuten. Dessutom har han tidigare tänt eld inne på en av toaletterna på PIVA. Ingen polisanmälan har gjorts. När du har träffat mannen bedömer du att han är i akut behov av psykiatrisk heldygnsvård med tvång. Han är förvirrad, pratar om att vara styrd av ett chip i nacken och mycket ambivalent till att stanna på sjukhuset. När du ringer bakjouren för att diskutera inläggning får du till svar \"Honom vill vi helst inte ha här, ring bakjouren på rättspsyk och fråga om de kan ta honom, de är vana vid aggressiva patienter\". Om vi förutsätter att det finns ett akut behov av tvångsvård, vilken situation ger alltid förutsättningar för rättspsykiatrisk vård?", options:["Patienten har tidigare vårdats rättspsykiatriskt","Patienten säger sig föredra rättspsykiatrisk vård framför allmänpsykiatrisk vård","Patienten är misstänkt för ett brott och frihetsberövad","Patienten är aggressiv och svår att vårda tillsammans med andra psykiatriska patienter."], correct:3},
 {num:92, text:"En 55-årig kvinna med mångårig kontakt med vården på grund av vanföreställningssyndrom, ADHD och amfetaminbruk. Hon har dålig insikt och allians, och alla vårdtillfällen har varit enligt LPT. Hon har tänt eld på sitt boende och dömdes till rättspsykiatrisk vård med SUP för mordbrand för fem år sedan. Efter stabilisering och framgångsrik behandling övergick hon till öppen LRV. Behandlingen består av stämningsstabiliserande, antipsykosmedel och centralstimulantia, allt per oralt. Efter några månader i öppenvården börjar hon missa sina besök, slutar med alla tabletter utom centralstimulantia och återfaller i amfetaminbruk. Hon återintas till sluten vård efter att ha hittats förvirrad och avmagrad. Vilken av följande åtgärder bör vara det primära målet med slutenvården denna gång?", options:["Sätta in antipsykotiskt läkemedel i depotinjektionsform","Intensifiera substansbruksbehandling","Sätta ut centralstimulerande läkemedel","Öka dosen av antipsykotiska läkemedel"], correct:1},

 {num:94, text:"Nedan listas fyra faktorer som alla brukar nämnas bidra till insjuknande i schizofreni. Vilken av dessa anses vara den viktigaste faktorn?", options:["Ärftlighet","Drogbruk, särskilt cannabis","Komplikationer under graviditet och förlossning","Migration"], correct:1},
 {num:95, text:"Psykotiska symptom är sinnebilden av vad som kännetecknas som allvarlig psykisk störning. Bör en patient med schizofreni alltid vårdas med stöd av LPT?", options:["Nej, bara om hen misstänks för ett brott","Ja, om hen uttrycker suicidtankar","Ja, om hen inte vill läggas in","Nej, det beror på hens behov av slutenvård"], correct:4},
 {num:96, text:"Som jourläkare har du har skrivit vårdintyg på en agiterad och psykotisk 28-årig man, Daniel. Han har en känd psykossjukdom men är i övrigt fullt kroppsligt frisk. Trots att du försökte förmedla besked om vårdintyg så respektfullt och sansat som möjligt så blir patienten hotfull och våldsam mot personalen. Dessa \"tar ned\" Daniel på golvet. Han gör kraftigt motstånd och avvisar erbjudande att ta emot peroral behandling. Vilket av följande alternativ är mest korrekt vidare handläggning?", options:["Ordinerar fastspänning för att förhindra att Daniel skadar andra. Ordinerar injektion haloperidol 5 mg och lorazepam 2 mg, som ges samtidigt, mot akut aggressivitet och för att häva akut agitation. När situationen lugnat ned sig, efter cirka en timme, kontaktar jag bakjour för att denne ska kunna ta ställning till att fatta intagningsbeslut.","Då Daniel varit våldsam och är fortsatt hotfull och aggressiv kan personalen med hänvisning till nödvärn fortsatt hålla fast honom. Jag kontaktar under tiden bakjour så att denne kan ta ställning till att fatta intagningsbeslut. Därefter kan tvångsåtgärder vidtas enligt LPT.","Ordinerar fastspänning för att förhindra att Daniel skadar andra eller sig själv. Kontaktar bakjour för att diskutera vidare ordination och för att denne skyndsamt ska kunna ta ställning till att fatta intagningsbeslut.","Ordinerar fastspänning för att förhindra att Daniel skadar andra. Ordinerar intramuskulär (im) injektion olanzapin 10 mg och (im) injektion lorazepam 2 mg som ges samtidigt, mot akut aggressivitet och för att häva akut agitation. Kontaktar bakjour för att denne skyndsamt ska kunna ta ställning till att fatta intagningsbeslut."], correct:3},
 {num:97, text:"Vem eller vilken instans tar beslut om att inleda en utredning enligt LVM (Lagen om vård av missbrukare i vissa fall)?", options:["Förvaltningsrätten","Läkare i allmän tjänst","Socialtjänsten","Chefsöverläkaren"], correct:3},
 {num:98, text:"Vilket av följande påståenden kring LVM (Lagen om vård av missbrukare i vissa fall) är korrekt?", options:["Syftet med vården är att motivera individen till att ta emot frivilliga insatser","Om en individ uppfyller kriterierna för LVM och LPT samtidigt ska vården inledas enligt LVM och förutsättningarna för LPT faller.","Enligt LVM är det alltid läkaren som beslutar om tvångsvård, utan att någon annan instans behöver involveras","LVM kräver alltid att den missbrukande individen är inlagd på sjukhus för att vården ska kunna påbörjas."], correct:1},
 {num:99, text:"Birgitta, 81 år, är multisjuk men hemmaboende och vanligtvis utan påtaglig kognitiv nedsättning. Ingen känd psykisk sjukdom. Påträffas av hemtjänsten på morgonen och är inte sig lik. Talar om att ett helt fotbollslag stod i hennes sovrum förut, talar osammanhängande om en konstig bil utanför och någon slags oklar brottslig aktivitet i trapphuset. Mitt under deras besök blir hon jätterädd, öppnar fönstret och börjar ropa på hjälp. För ett dygn sedan var hon som vanligt. Ambulans tillkallas och Birgitta förs till psykiatriska akutmottagningen där du är primärjour. Där är hon fortsatt \"helsnurrig\" och vandrar runt på stapplande ben, svår att få kontakt med. Man lyckas ta temp, puls och blodtryck som inte är uppenbart avvikande. Vilket av följande handlingsalternativ är mest korrekt?", options:["Beställer DT hjärna och provtagning avseende eventuell infektion, metabol rubbning samt EKG och avvaktar svar på dessa undersökningar innan vidare handläggning.","Då Birgitta är psykotisk och har en ohållbar hemsituation utfärdar jag vårdintyg och lägger in henne för vidare behandling. Somatisk undersökning och provtagning görs via avdelning.","Med tanke på att miljöombyte kan förvärra Birgittas tillstånd bör man undvika inläggning på sjukhus. Jag kontaktar därför mobilt närsjukvårdsteam samt ringer upp biståndshandläggare i kommunen och patientens vårdcentral för att ordna med uppföljning och akut vårdplanering i hemmet.","Jag remitterar Birgitta till medicinsk akutmottagning för deras bedömning, utredning och eventuell behandling av akut kroppslig sjukdom som orsak till Birgittas symtom."], correct:4},
 {num:100, text:"Vilken av dessa kriterier ingår i diagnos för alkoholbrukssyndrom?", options:["Man har vid minst ett tidigare tillfälle sökt vård på grund av alkoholproblem","Man dricker mer eller under längre tid än man önskat","Man dricker minst 10 enheter alkohol i veckan","B-PEth ligger över 0.3"], correct:2},

 {num:102, text:"Naloxon är en opioidantagonist som kan häva en opioidöverdos och därmed vara livräddande. Naloxon finns bland annat som nässpray och kan delas ut till personer med opioidberoende. Det finns dock en viktig sak att tänka på när det gäller Naloxon. Vad?", options:["Naloxon har kort halveringstid, upprepade doser kan därför behövas.","Cirka 0,2 % av alla människor är allergiska mot Naloxon och kan få anafylaxi.","Om det ges till någon som ej tagit opioider kan det utlösa ett krampanfall.","Man måste provspraya i luften för att se att sprayen funkar."], correct:1},

 {num:104, text:"En 62-årig kvinna söker tillsammans med sin make på grund av tilltagande minnesproblem. Hon har ett välbehandlat blodtryck och diabetes typ 2. Hon har inga problem att kommunicera språkligt och kan redogöra för sina problem. Hon kör bil utan anmärkning och har inga svårigheter att hitta när hon kör eller promenerar. Sköter sina vardagliga sysslor ungefär som tidigare och har koll på sitt blodsocker och sina mediciner i en dosett. Maken upplever att hustrun har fått tilltagande närminnesproblem senaste året och upprepar ofta information. MMSE (Mini Mental State Examination) visar 28/30 poäng med avdrag för -2 för fördröjd återgivning. Du arbetar vid vårdcentralen. Vilken av följande är den mest sannolika diagnosen?", options:["Kognitiv sjukdom av Alzheimers sjukdom på en MCI (lindrig kognitiv störningsnivå)","Kognitiv sjukdom av Lewykroppstyp på en MCI (lindrig kognitiv störningsnivå)","Kognitiv sjukdom av Alzheimers sjukdom på en svår demensnivå","Kognitiv sjukdom av vaskulär typ på en MCI (lindrig kognitiv störningsnivå)","Kognitiv sjukdom av frontotemporal demenssjukdom på en MCI (lindrig kognitiv störningsnivå)"], correct:1},
 {num:105, text:"En 68-årig man kommer till sin vårdcentral för ett uppföljningsbesök. Han fick sin andra ischemiska stroke för cirka sex månader sedan och har inga bestående motoriska men efter det. Däremot har han fått problem i vardagen och har behövt sluta sitt arbete som ekonom då han inte har klarat av arbetsbördan och beräkningar i nya datorprogrammet. Hans hyperkolesterolemi och hypertoni är välbehandlade. Hustrun berättar att patienten haft problem med att planera och lösa komplexa uppgifter och har blivit mer oföretagsam, men visar bra empati. En neuropsykologisk undersökning visar att patienten har nedsatt exekutiv funktion och uppmärksamhet men relativt välbevarat minne. Han har en MMSE på 21/30 poäng. En MRT-hjärna visar kortikala ischemiska förändringar. Vilken av följande är den mest sannolika diagnosen?", options:["Kognitiv sjukdom av frontotemporal demenssjukdom på en lindrig demensnivå","Kognitiv sjukdom av Alzheimers sjukdom på en lindrig demensnivå","Kognitiv sjukdom av Alzheimers sjukdom på en svår demensnivå","Kognitiv sjukdom av vaskulär typ på en lindrig demensnivå","Kognitiv sjukdom av Lewykroppstyp på en lindrig demensnivå"], correct:4},
 {num:106, text:"En 84-årig man kommer med ambulans till akutmottagningen. Han har sedan tidigare en känd mild demens av Alzheimers sjukdom, vilket har fungerat väl tills för två dagar sedan. Hustrun hjälper med medicinerna och patienten kunde tills för två dagar sedan sköta sin hygien själv, äta själv och gå enklare promenader i deras närområde själv. Gillar att titta på fotboll på TV och umgås ofta med sin granne. Patienten har inga andra sjukdomar kända bortsett från hypertoni som behandlas med Candesartan 8 mg x 1 samt Donepezil 10 mg x 1. De senaste två dagarna har han tilltagande blivit mer desorienterad och fått problem med minnet. Vid undersökningen noterar du att patienten är rastlös, har visuella hallucinationer och verkar plocka saker som inte finns i en tekopp. Han är irritabel, vandrar runt i mottagningsrummet och uppvisar minnesstörning. Vilken av följande är den mest sannolika diagnosen?", options:["Försämring i sin Alzheimer sjukdom demens till en moderat nivå","Konfusion","Vanföreställningssyndrom","Bipolär sjukdom med irritabilitet","Depression med psykotiska symptom"], correct:2},
 {num:107, text:"En 21-årig kvinna med lindrig intellektuell funktionsnedsättning söker tillsammans med sin mamma på vårdcentralen, där du arbetar. Kvinnan tycker att det är onödigt att de har gått till vårdcentralen, men mamman är av en annan åsikt. Mamman säger att dottern har ätit sämre den senaste månaden, hon har fått svårt att somna på kvällarna, vill inte längre träffa sina syskon eller åka på lägerverksamhet – något som hon tidigare alltid har tyckt om att göra. Vad är viktigt i ditt fortsatta samtal?", options:["Fortsätt att fokusera på att få en bra anamnes från modern.","Tala till patienten i första hand och tala enkelt/använd konkret språk.","Fråga patienten om det skulle underlätta om man anlitade en teckenspråkstolk, som skulle kunna vara med vid ett återbesök.","Boka ett nytt besök snarast och be att god man följer med i stället för mamman."], correct:2},
 {num:108, text:"På psykakuten träffar du en 47-årig man som beskriver att han är i kris. Han har blivit av med sitt jobb som granskare av sjökort, eftersom hela verksamheten digitaliserats. Socialt får du fram att han lever ensam. Han bor i en lägenhet där även föräldrarna tidigare bodde, innan de gick bort. Han har ingen partner. På fritiden har han inget umgänge, men han brukar byta några \"artighetsfraser\" med personer som han träffar på skytteklubben, där han är medlem. Han är duktig skytt och brukar tillbringa all ledig tid på skytteklubben. Patienten berättar gärna om vilka pistoler man använder på klubben och hur många pistoler han har i sin privata samling. Han går alltid upp prick kl. 05:30 och lägger sig kl. 22:15. I psykiskt status noteras nedsatt emotionell kontakt. Psykomotorisk hämning i form av utslätad ansiktsmimik och avsaknad av gester; håller armarna i kors över bröstet. Ger dålig ögonkontakt, tittar upp i taket under hela samtalet. Vilken bakomliggande problematik misstänker du?", options:["Samlarsyndrom","Autism","Social ångest","Egentlig depression"], correct:2},

 {num:111, text:"Vad är sant avseende substansbrukssyndrom och suicid?", options:["Substansbrukssyndrom är i sig ingen riskfaktor för suicid, riskökningen finns bara om personen också har en annan psykiatrisk diagnos","Det är bara vid opioidbrukssyndrom och alkoholbrukssyndrom det finns en visad förhöjd risk","Substansbrukssyndrom är en stark riskfaktor för suicid, statistiskt på nästan samma nivå som schizofreni och bipolär sjukdom","Det går inte att bedöma suicidrisk när någon är påverkad av alkohol eller droger, dessa personer bör hänvisas att återkomma när de är nyktra"], correct:3},

       `).join('')}
     </div>
   `;
   container.appendChild(card);
 });
}

function answer(qNum, chosen) {
 if (userAnswers[qNum] !== undefined) return;
 userAnswers[qNum] = chosen;
 answeredCount++;
  const q = questions.find(q => q.num === qNum);
 q.options.forEach((_, i) => {
   const btn = document.getElementById(`opt-${qNum}-${i+1}`);
   btn.classList.add('answered');
   if (i + 1 === q.correct) btn.classList.add('correct');
   else if (i + 1 === chosen) btn.classList.add('wrong');
 });
  updateScore();
 if (answeredCount === questions.length) document.getElementById('finish-btn').style.display = 'block';
}

function updateScore() {
 let correct = 0;
 for (const [qNum, chosen] of Object.entries(userAnswers)) {
   const q = questions.find(q => q.num === parseInt(qNum));
   if (q && q.correct === chosen) correct++;
 }
 document.getElementById('score-display').textContent = `${correct} / ${questions.length}`;
 document.getElementById('progress-bar').style.width = (answeredCount / questions.length * 100) + '%';
}

function showResults() {
 let correct = 0;
 const wrongOnes = [];
 for (const q of questions) {
   const chosen = userAnswers[q.num];
   if (chosen === q.correct) correct++;
   else if (chosen !== undefined) wrongOnes.push({num: q.num, text: q.text.substring(0, 80) + '...'});
 }
 const total = questions.length;
 document.getElementById('final-score').textContent = `${correct}/${total}`;
 document.getElementById('result-detail').textContent = `Du svarade rätt på ${correct} av ${total} frågor (${Math.round(correct/total*100)}%).`;
 const wrongList = document.getElementById('wrong-list');
 wrongList.innerHTML = wrongOnes.length > 0
   ? `<h3>Fel svar (${wrongOnes.length} st):</h3>` + wrongOnes.map(w => `<p>• Fråga ${w.num}: ${w.text}</p>`).join('')
   : '<p>Perfekt! Inga fel svar.</p>';
 document.getElementById('results-panel').style.display = 'block';
 document.getElementById('finish-btn').style.display = 'none';
 document.getElementById('results-panel').scrollIntoView({behavior: 'smooth'});
}

renderQuestions();
</script>
</body>
</html>
