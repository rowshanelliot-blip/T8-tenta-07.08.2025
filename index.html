const userAnswers = {};
let answeredCount = 0;

function renderQuestions() {
 const container = document.getElementById('questions-container');
 questions.forEach(q => {
   const card = document.createElement('div');
   card.className = 'question-card';
   let imageHtml = '';
   if (q.image) {
     imageHtml = `<img src="${q.image}" alt="Question ${q.num} image" class="q-image">`;
   }
   card.innerHTML = `
     <div class="q-header">
       <div class="q-num">${q.num}</div>
       <div class="q-text">${q.text}</div>
     </div>
     ${imageHtml}
     <div class="options">
       ${q.options.map((opt, i) => `
         <button class="option" onclick="answer(${q.num}, ${i+1})" id="opt-${q.num}-${i+1}">
           ${opt}
         </button>
       `).join('')}
     </div>
   `;
   container.appendChild(card);
 });
}

function answer(qNum, chosen) {
 if (userAnswers[qNum] !== undefined) return;
 userAnswers[qNum] = chosen;
 answeredCount++;
  const q = questions.find(q => q.num === qNum);
 q.options.forEach((_, i) => {
   const btn = document.getElementById(`opt-${qNum}-${i+1}`);
   btn.classList.add('answered');
   if (i + 1 === q.correct) btn.classList.add('correct');
   else if (i + 1 === chosen) btn.classList.add('wrong');
 });
  updateScore();
 if (answeredCount === questions.length) document.getElementById('finish-btn').style.display = 'block';
}

function updateScore() {
 let correct = 0;
 for (const [qNum, chosen] of Object.entries(userAnswers)) {
   const q = questions.find(q => q.num === parseInt(qNum));
   if (q && q.correct === chosen) correct++;
 }
 document.getElementById('score-display').textContent = `${correct} / ${questions.length}`;
 document.getElementById('progress-bar').style.width = (answeredCount / questions.length * 100) + '%';
}

function showResults() {
 let correct = 0;
 const wrongOnes = [];
 for (const q of questions) {
   const chosen = userAnswers[q.num];
   if (chosen === q.correct) correct++;
   else if (chosen !== undefined) wrongOnes.push({num: q.num, text: q.text.substring(0, 80) + '...'});
 }
 const total = questions.length;
 document.getElementById('final-score').textContent = `${correct}/${total}`;
 document.getElementById('result-detail').textContent = `Du svarade rätt på ${correct} av ${total} frågor (${Math.round(correct/total*100)}%).`;
 const wrongList = document.getElementById('wrong-list');
 wrongList.innerHTML = wrongOnes.length > 0
   ? `<h3>Fel svar (${wrongOnes.length} st):</h3>` + wrongOnes.map(w => `<p>• Fråga ${w.num}: ${w.text}</p>`).join('')
   : '<p>Perfekt! Inga fel svar.</p>';
 document.getElementById('results-panel').style.display = 'block';
 document.getElementById('finish-btn').style.display = 'none';
 document.getElementById('results-panel').scrollIntoView({behavior: 'smooth'});
}

renderQuestions();
</script>
